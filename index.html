<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pemantauan MIMO Kedah</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Space Grotesk -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <!-- React & ReactDOM (UMD CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone compiler (In-browser JSX compilation) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- PapaParse CDN for Google Sheets Dynamic Client parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    /* Simple geometric scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 0px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              350: '#7dd3fc',
              450: '#38bdf8',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root">
    <!-- Loader before Babel compiles -->
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-700">
      <div class="w-12 h-12 rounded-full border-4 border-slate-100 border-t-sky-500 animate-spin mb-4"></div>
      <p class="font-medium text-slate-900 text-sm">Memuat naik Sistem Pemantauan MIMO...</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CLINIC_SHORTS = {
      "KLINIK KESIHATAN BANDAR ALOR SETAR": "KKBAS",
      "KLINIK KESIHATAN BANDAR SUNGAI PETANI": "KKBSP"
    };

    // Responsive Inline custom SVG Indicators 
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const paths = {
        trending: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />,
        users: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />,
        map: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z" />,
        refresh: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2" />,
        shield: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
        info: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        chevronRight: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />,
        check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />,
        x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
      };
      
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          {paths[name] || null}
        </svg>
      );
    };

    const MimoVectorLogo = () => (
      <div className="flex items-center gap-2 select-none shrink-0">
        <div className="w-11 h-11 bg-white p-0.5 flex items-center justify-center border border-slate-200 rounded-lg shadow-xs">
          <svg viewBox="0 0 200 200" className="w-[40px] h-[40px]" fill="none" xmlns="http://www.w3.org/2000/svg">
            {/* Soft-rounded outer shield / crest in blue */}
            <path d="M25 40C25 40 55 25 100 25C145 25 175 40 175 40C175 40 185 110 160 145C135 180 100 185 100 185C100 185 65 180 40 145C15 110 25 40 25 40Z" fill="#ffffff" stroke="#2d529f" strokeWidth="11" strokeLinejoin="round" />
            
            {/* Light blue orbit loops / ribbons in the background */}
            <path d="M60 85 C52 55, 148 55, 140 85 C132 115, 68 115, 60 85 Z" stroke="#8cb2e6" strokeWidth="7" strokeLinecap="round" opacity="0.65" />
            <path d="M70 100 C70 115, 130 115, 130 100" stroke="#8cb2e6" strokeWidth="4.5" strokeLinecap="round" opacity="0.6" />

            {/* Bright inner blue shield */}
            <path d="M100 55 C120 40, 145 60, 130 100 C118 120, 100 135, 100 135 C100 135, 82 120, 70 100 C55 60, 80 40, 100 55 Z" fill="#2d529f" />

            {/* White Healthcare Cross inside Center */}
            <path d="M91 68 H109 V104 H91 Z" fill="#ffffff" />
            <path d="M82 77 H118 V95 H82 Z" fill="#ffffff" />

            {/* White pulse wave line laid inside the cross */}
            <path d="M75 86 h10 l4 -13 l5 28 l6 -23 l3 8 h15" stroke="#2d529f" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            <path d="M75 86 h10 l4 -13 l5 28 l6 -23 l3 8 h15" stroke="#ffffff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{transform: "translateY(0.5px)"}} />

            {/* Polished heavy typography MIMO */}
            <text x="100" y="162" fill="#2d529f" fontSize="24" fontWeight="950" fontFamily="'Space Grotesk', sans-serif" textAnchor="middle" letterSpacing="0.5">MIMO</text>
            
            {/* Subtitle */}
            <text x="100" y="174" fill="#5f7da3" fontSize="5.5" fontWeight="700" fontFamily="sans-serif" textAnchor="middle">MANAGEMENT OF OBESITY</text>
          </svg>
        </div>
      </div>
    );

    // Native custom highly stylized responsive SVG Bar chart
    const ComorbidityBarChart = ({ data }) => {
      const maxVal = 12;
      const chartHeight = 200;
      const groundY = 220;

      return (
        <div className="w-full flex items-center justify-center p-2 font-mono">
          <svg className="w-full h-64 max-w-md" viewBox="0 0 460 260" xmlns="http://www.w3.org/2000/svg">
            {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => {
              const y = 20 + ratio * chartHeight;
              const label = Math.round((1 - ratio) * maxVal);
              return (
                <g key={i}>
                  <line x1="40" y1={y} x2="440" y2={y} stroke="#f1f5f9" strokeWidth="1" />
                  <text x="30" y={y + 4} fill="#94a3b8" fontSize="10" textAnchor="end">{label}</text>
                </g>
              );
            })}

            {data.map((item, idx) => {
              const groupX = 60 + idx * 190;
              const barWidth = 28;
              const gap = 8;

              const dm = item.Diabetes || 0;
              const ht = item.Hipertensi || 0;
              const dl = item.Dislipidemia || 0;

              const dmH = (dm / maxVal) * chartHeight;
              const htH = (ht / maxVal) * chartHeight;
              const dlH = (dl / maxVal) * chartHeight;

              return (
                <g key={idx}>
                  <text x={groupX + barWidth * 1.5 + gap} y={groundY + 20} fill="#475569" fontSize="11" fontWeight="700" textAnchor="middle" className="font-sans font-display">
                    {item.clinic === 'KKBAS' ? 'KK Bandar Alor Setar' : 'KK Sg. Petani'}
                  </text>
                  {/* Diabetes */}
                  <rect x={groupX} y={groundY - dmH} width={barWidth} height={dmH} fill="#3b82f6" />
                  <text x={groupX + barWidth/2} y={groundY - dmH - 6} fill="#0f172a" fontSize="9" fontWeight="900" textAnchor="middle">{dm}</text>

                  {/* Hipertensi */}
                  <rect x={groupX + barWidth + gap} y={groundY - htH} width={barWidth} height={htH} fill="#ef4444" />
                  <text x={groupX + barWidth + gap + barWidth/2} y={groundY - htH - 6} fill="#0f172a" fontSize="9" fontWeight="900" textAnchor="middle">{ht}</text>

                  {/* Dislipidemia */}
                  <rect x={groupX + 2*barWidth + 2*gap} y={groundY - dlH} width={barWidth} height={dlH} fill="#0d9488" />
                  <text x={groupX + 2*barWidth + 2*gap + barWidth/2} y={groundY - dlH - 6} fill="#0f172a" fontSize="9" fontWeight="900" textAnchor="middle">{dl}</text>
                </g>
              );
            })}
            <line x1="40" y1={groundY} x2="440" y2={groundY} stroke="#cbd5e1" strokeWidth="1.5" />
          </svg>
        </div>
      );
    };

    // Native circular SVG Donut Chart
    const BmiDonutChart = ({ data, total }) => {
      let accumulatedPercent = 0;
      const radius = 50;
      const strokeWidth = 14;
      const circumference = 2 * Math.PI * radius;

      return (
        <div className="relative w-full h-[220px] flex items-center justify-center">
          <svg className="w-56 h-56 transform -rotate-90" viewBox="0 0 140 140">
            {data.map((item, index) => {
              const val = item.value;
              const percent = val / (total || 1);
              const strokeLength = percent * circumference;
              const strokeOffset = circumference - (accumulatedPercent * circumference);
              accumulatedPercent += percent;

              const colors = ['#38bdf8', '#0ea5e9', '#0284c7', '#0c4a6e', '#64748b'];
              const color = colors[index % colors.length];

              return (
                <circle 
                  key={index}
                  cx="70"
                  cy="70"
                  r={radius}
                  fill="transparent"
                  stroke={color}
                  strokeWidth={strokeWidth}
                  strokeDasharray={`${strokeLength} ${circumference}`}
                  strokeDashoffset={strokeOffset}
                  style={{ transformOrigin: '70px 70px' }}
                />
              );
            })}
          </svg>
          <div className="absolute inset-0 flex flex-col justify-center items-center pointer-events-none mt-[-4px]">
            <span className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">KUMPULAN</span>
            <span className="text-sm font-black text-slate-900 tracking-wide font-display">OBESITI</span>
          </div>
        </div>
      );
    };

    function parseFloatSafe(val) {
      if (val === undefined || val === null) return 0;
      const cleaned = String(val).replace(/,/g, '').trim();
      const num = parseFloat(cleaned);
      return isNaN(num) ? 0 : num;
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedClinic, setSelectedClinic] = useState('all');
      const [selectedBmiClass, setSelectedBmiClass] = useState('all');
      const [selectedGender, setSelectedGender] = useState('all');
      const [selectedIntervention, setSelectedIntervention] = useState('all');

      const [activePage, setActivePage] = useState('page1');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState(null);
      const [selectedPatient, setSelectedPatient] = useState(null);

      async function fetchClientData() {
        setLoading(true);
        const url = 'https://docs.google.com/spreadsheets/d/1Zn7JHkTrfol2G0Sl4b0oazryk2Syhbp0Xj74HPD1PXU/export?format=csv';
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`Google Sheet fetch error status ${response.status}`);
          const text = await response.text();
          
          Papa.parse(text, {
            header: false,
            complete: (results) => {
              const rows = results.data;
              const patientRows = rows.slice(7).filter(row => row[6] && row[6].trim() !== '');

              const patients = patientRows.map((row) => {
                const mntVal = (row[59] || '').trim().toUpperCase();
                const senamanVal = (row[61] || '').trim().toUpperCase();
                const tingkahlakuVal = (row[63] || '').trim().toUpperCase();
                const farmakologiVal = (row[65] || '').trim().toUpperCase();
                const bariatrikVal = (row[69] || '').trim().toUpperCase();

                const isMNT = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(mntVal);
                const isSenaman = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(senamanVal);
                const isTingkahLaku = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(tingkahlakuVal);
                const isFarmakologi = farmakologiVal !== '' && farmakologiVal !== 'TIDAK BERKAITAN' && farmakologiVal !== 'TIDAK';
                const isBariatrik = bariatrikVal !== '' && bariatrikVal !== 'TIDAK BERKAITAN' && bariatrikVal !== 'TIDAK';

                return {
                  negeri: (row[0] || '').trim(),
                  daerah: (row[1] || '').trim(),
                  fasiliti: (row[2] || '').trim(),
                  sumberRujukan: (row[3] || '').trim(),
                  statusRujukan: (row[5] || '').trim(),
                  nama: (row[6] || '').trim(),
                  noId: (row[7] || '').trim(),
                  tarikhLahir: (row[8] || '').trim(),
                  umur: parseFloatSafe(row[9]),
                  bangsa: (row[10] || '').trim(),
                  jantina: (row[11] || '').trim(),
                  noTelefon: (row[12] || '').trim(),

                  comorbidities: {
                    diabetes: (row[13] || '').trim().toUpperCase() === 'YA',
                    hipertensi: (row[14] || '').trim().toUpperCase() === 'YA',
                    dislipidemia: (row[15] || '').trim().toUpperCase() === 'YA',
                    kardiovaskular: (row[16] || '').trim().toUpperCase() === 'YA',
                    lainLain: (row[17] || '').trim() !== '' && (row[17] || '').trim().toUpperCase() !== 'TIDAK'
                  },

                  baseline: {
                    tinggi: parseFloatSafe(row[18]),
                    berat: parseFloatSafe(row[19]),
                    bmi: parseFloatSafe(row[20]),
                    bmiKategori: (row[21] || '').trim(),
                    waist: parseFloatSafe(row[22]),
                    systolic: parseFloatSafe(row[23]),
                    diastolic: parseFloatSafe(row[24]),
                    mentalStatus: (row[52] || '').trim(),
                    mentalResult: (row[53] || '').trim()
                  },

                  interventions: {
                    mnt: isMNT,
                    mntTarikh: (row[60] || '').trim(),
                    senaman: isSenaman,
                    senamanTarikh: (row[62] || '').trim(),
                    tingkahLaku: isTingkahLaku,
                    tingkahLakuTarikh: (row[64] || '').trim(),
                    farmakologi: (row[65] || '').trim(),
                    farmakologiTarikh: (row[66] || '').trim(),
                    bariatrik: isBariatrik,
                    bariatrikTarikh: (row[70] || '').trim()
                  },
                  tarikhDaftar: (row[197] || '').trim(),
                  statusAkaun: (row[199] || 'AKTIF').trim()
                };
              });

              const clinicsMap = {
                "KLINIK KESIHATAN BANDAR ALOR SETAR": {
                  name: "KK Bandar Alor Setar (KKBAS)",
                  keyName: "KLINIK KESIHATAN BANDAR ALOR SETAR",
                  registeredCount: 0,
                  withInterventionCount: 0,
                  mntCount: 0,
                  senamanCount: 0,
                  tingkahlakuCount: 0,
                  farmakologiCount: 0
                },
                "KLINIK KESIHATAN BANDAR SUNGAI PETANI": {
                  name: "KK Bandar Sungai Petani (KKBSP)",
                  keyName: "KLINIK KESIHATAN BANDAR SUNGAI PETANI",
                  registeredCount: 0,
                  withInterventionCount: 0,
                  mntCount: 0,
                  senamanCount: 0,
                  tingkahlakuCount: 0,
                  farmakologiCount: 0
                }
              };

              patients.forEach(p => {
                let key = p.fasiliti;
                if (!clinicsMap[key]) {
                  if (key.includes('ALOR SETAR')) {
                    key = "KLINIK KESIHATAN BANDAR ALOR SETAR";
                  } else if (key.includes('SUNGAI PETANI')) {
                    key = "KLINIK KESIHATAN BANDAR SUNGAI PETANI";
                  } else {
                    clinicsMap[key] = {
                      name: key,
                      keyName: key,
                      registeredCount: 0,
                      withInterventionCount: 0,
                      mntCount: 0,
                      senamanCount: 0,
                      tingkahlakuCount: 0,
                      farmakologiCount: 0
                    };
                  }
                }

                const clinic = clinicsMap[key];
                clinic.registeredCount++;

                const hasAny = p.interventions.mnt || p.interventions.senaman || p.interventions.tingkahLaku || (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK');
                if (hasAny) clinic.withInterventionCount++;

                if (p.interventions.mnt) clinic.mntCount++;
                if (p.interventions.senaman) clinic.senamanCount++;
                if (p.interventions.tingkahLaku) clinic.tingkahlakuCount++;
                if (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK') clinic.farmakologiCount++;
              });

              const clinicsList = Object.values(clinicsMap).map(c => {
                const pct = c.registeredCount > 0 ? (c.withInterventionCount / c.registeredCount * 100) : 0;
                return {
                  ...c,
                  kpiPercentage: Math.round(pct * 10) / 10,
                  isAchieved: pct >= 80.0
                };
              });

              const totalReg = patients.length;
              const totalInt = patients.filter(p => p.interventions.mnt || p.interventions.senaman || p.interventions.tingkahLaku || (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK')).length;
              const overallPct = totalReg > 0 ? (totalInt / totalReg * 100) : 0;

              setData({
                lastUpdated: new Date().toISOString(),
                overall: {
                  registeredCount: totalReg,
                  withInterventionCount: totalInt,
                  kpiPercentage: Math.round(overallPct * 10) / 10,
                  isAchieved: overallPct >= 80.0,
                  targetPercentage: 80.0
                },
                clinics: clinicsList,
                patients
              });
              setError(null);
            },
            error: (err) => {
              setError(err.message || 'Gagal menghurai data CSV.');
            }
          });
        } catch (err) {
          setError(err.message || 'Gagal memuat turun data dari Google Sheets.');
        } finally {
          setLoading(false);
        }
      }

      useEffect(() => {
        fetchClientData();
      }, []);

      if (loading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-slate-700">
            <div className="w-12 h-12 rounded-full border-4 border-slate-100 border-t-sky-500 animate-spin mb-4"></div>
            <p className="font-semibold text-slate-850 text-sm">Menghubungi Google Sheet...</p>
            <p className="text-slate-400 text-xs mt-1">Sistem Pemantauan MIMO Kedah terbina...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-slate-750">
            <div className="bg-white p-8 rounded-none border border-slate-200 shadow-sm max-w-sm w-full text-center">
              <div className="w-12 h-12 bg-red-50 text-red-500 rounded-none border border-red-200 flex items-center justify-center mx-auto mb-4">
                <Icon name="x" className="w-6 h-6" />
              </div>
              <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 font-display">Talian Gagal</h3>
              <p className="text-xs text-slate-500 mb-6">{error}</p>
              <button onClick={fetchClientData} className="w-full py-2 px-4 bg-sky-500 hover:bg-sky-600 text-black font-black uppercase text-xs tracking-wider rounded-none">
                Cuba Semula
              </button>
            </div>
          </div>
        );
      }

      // Safe state mapping
      const { overall, clinics, patients } = data;

      // Primary filter algorithm
      const filteredPatients = patients.filter(p => {
        const matchesSearch = p.nama.toLowerCase().includes(searchTerm.toLowerCase()) || p.noId.includes(searchTerm) || p.noTelefon.includes(searchTerm);
        const matchesClinic = selectedClinic === 'all' || p.fasiliti.toUpperCase().includes(selectedClinic.toUpperCase());
        const matchesBmi = selectedBmiClass === 'all' || p.baseline.bmiKategori.toUpperCase() === selectedBmiClass.toUpperCase();
        const matchesGender = selectedGender === 'all' || p.jantina.toUpperCase() === selectedGender.toUpperCase();
        
        let matchesInt = true;
        if (selectedIntervention === 'mnt') matchesInt = p.interventions.mnt;
        else if (selectedIntervention === 'senaman') matchesInt = p.interventions.senaman;
        else if (selectedIntervention === 'tingkah') matchesInt = p.interventions.tingkahLaku;
        else if (selectedIntervention === 'ubat') matchesInt = (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK');

        return matchesSearch && matchesClinic && matchesBmi && matchesGender && matchesInt;
      });

      // Stats pre-computes
      const bmiCounts = {};
      patients.forEach(p => {
        const cat = p.baseline.bmiKategori || 'Kategori Tidak Diisytiharkan';
        bmiCounts[cat] = (bmiCounts[cat] || 0) + 1;
      });
      const bmiChartData = Object.keys(bmiCounts).map(k => ({ name: k, value: bmiCounts[k] }));

      const clinicComorb = {
        KKBAS: { diabetes: 0, hipertensi: 0, dislipidemia: 0, count: 0 },
        KKBSP: { diabetes: 0, hipertensi: 0, dislipidemia: 0, count: 0 }
      };
      patients.forEach(p => {
        const s = CLINIC_SHORTS[p.fasiliti] || 'KKBAS';
        if (clinicComorb[s]) {
          clinicComorb[s].count++;
          if (p.comorbidities.diabetes) clinicComorb[s].diabetes++;
          if (p.comorbidities.hipertensi) clinicComorb[s].hipertensi++;
          if (p.comorbidities.dislipidemia) clinicComorb[s].dislipidemia++;
        }
      });
      const comorbidityChartData = Object.keys(clinicComorb).map(k => ({
        clinic: k,
        'Diabetes': clinicComorb[k].diabetes,
        'Hipertensi': clinicComorb[k].hipertensi,
        'Dislipidemia': clinicComorb[k].dislipidemia
      }));

      // Age categorization
      const ageBrackets = { 'Bawah 30': 0, '30 - 39': 0, '40 - 49': 0, '50 ke atas': 0 };
      patients.forEach(p => {

                            <p className="text-[10px] text-slate-500 mt-0.5">Cari maklumat khusus pendaftaran rujukan, ukuran baseline, saringan minda DASS.</p>
                          </div>

                          <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-2">
                            <div className="relative">
                              <input 
                                type="text" 
                                placeholder="Cari Nama / No. KP..." 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="w-full text-xs py-2 pl-7 pr-2 border border-slate-300 bg-white"
                              />
                              <Icon name="search" className="w-3.5 h-3.5 absolute left-2 top-2.5 text-slate-400" />
                            </div>

                            <select value={selectedClinic} onChange={(e) => setSelectedClinic(e.target.value)} className="text-xs py-2 px-2 border border-slate-300 bg-white">
                              <option value="all">Klinik: Semua</option>
                              <option value="ALOR SETAR">KKBAS</option>
                              <option value="SUNGAI PETANI">KKBSP</option>
                            </select>

                            <select value={selectedBmiClass} onChange={(e) => setSelectedBmiClass(e.target.value)} className="text-xs py-2 px-2 border border-slate-300 bg-white">
                              <option value="all">BMI: Semua</option>
                              <option value="OBES II">Obes II</option>
                              <option value="OBES III">Obes III</option>
                            </select>

                            <select value={selectedGender} onChange={(e) => setSelectedGender(e.target.value)} className="text-xs py-2 px-2 border border-slate-300 bg-white">
                              <option value="all">Jantina: Semua</option>
                              <option value="LELAKI">Lelaki</option>
                              <option value="PEREMPUAN">Perempuan</option>
                            </select>

                            <select value={selectedIntervention} onChange={(e) => setSelectedIntervention(e.target.value)} className="text-xs py-2 px-2 border border-slate-300 bg-white">
                              <option value="all">Intervensi: Semua</option>
                              <option value="mnt">Diet MNT</option>
                              <option value="senaman">Bersenam</option>
                              <option value="tingkah">Tingkah Laku</option>
                            </select>
                          </div>
                        </div>

                        {/* Patient Grid/Table */}
                        <div className="overflow-x-auto">
                          {filteredPatients.length === 0 ? (
                            <div className="p-8 text-center text-slate-500">
                              <Icon name="info" className="w-8 h-8 text-slate-400 mx-auto mb-2" />
                              <p className="text-xs font-semibold">Tiada Pesakit Ditemui</p>
                            </div>
                          ) : (
                            <table className="w-full text-left font-sans border-collapse text-xs">
                              <thead>
                                <tr className="bg-slate-100 border-b border-slate-200 text-slate-700 uppercase tracking-wider text-[9px] font-black">
                                  <th className="py-2.5 px-3">Nama</th>
                                  <th className="py-2.5 px-3">Klinik</th>
                                  <th className="py-2.5 px-3">KP / Umur</th>
                                  <th className="py-2.5 px-3">Baseline BMI</th>
                                  <th className="py-2.5 px-3 text-center">Intervensi</th>
                                  <th className="py-2.5 px-3 text-right">Profil</th>
                                </tr>
                              </thead>
                              <tbody className="divide-y divide-slate-200">
                                {filteredPatients.map((p, idx) => {
                                  const cS = CLINIC_SHORTS[p.fasiliti] || "KKBAS";
                                  return (
                                    <tr key={idx} className="hover:bg-slate-50 transition-colors">
                                      <td className="py-3 px-3">
                                        <div className="flex items-center gap-2">
                                          <div className={`w-6 h-6 border flex items-center justify-center font-black text-xs ${p.jantina.toUpperCase() === 'LELAKI' ? 'bg-blue-50 border-blue-200 text-blue-800' : 'bg-rose-50 border-rose-200 text-rose-800'}`}>
                                            {p.nama.charAt(0)}
                                          </div>
                                          <div>
                                            <p className="font-bold text-slate-900 uppercase text-xs">{p.nama}</p>
                                            <p className="text-[10px] text-slate-400 font-mono mt-0.5">{p.jantina} • Tel: {p.noTelefon}</p>
                                          </div>
                                        </div>
                                      </td>
                                      <td className="py-3 px-3">
                                        <span className="px-1.5 py-0.5 bg-sky-50 text-sky-850 font-black text-[9px] border border-sky-200 uppercase">{cS}</span>
                                      </td>
                                      <td className="py-3 px-3 font-semibold">
                                        <p className="font-mono text-xs">{p.noId}</p>
                                        <p className="text-[10px] text-slate-400 font-mono">{p.umur} Tahun</p>
                                      </td>
                                      <td className="py-3 px-3">
                                        <div className="flex items-baseline gap-1 font-bold text-slate-900">
                                          <span>{p.baseline.bmi}</span>
                                          <span className="text-[9px] text-slate-400 font-black uppercase tracking-wider">{p.baseline.bmiKategori}</span>
                                        </div>
                                        <p className="text-[10px] text-slate-400 font-mono">{p.baseline.berat} KG ({p.baseline.tinggi} cm)</p>
                                      </td>
                                      <td className="py-3 px-3">
                                        <div className="flex items-center justify-center gap-3">
                                          <div className="flex flex-col items-center">
                                            <span className="text-[8px] text-slate-400 font-bold mb-0.5">MNT</span>
                                            {p.interventions.mnt ? <Icon name="check" className="w-3.5 h-3.5 text-sky-500" /> : <Icon name="x" className="w-3.5 h-3.5 text-slate-200" />}
                                          </div>
                                          <div className="flex flex-col items-center">
                                            <span className="text-[8px] text-slate-400 font-bold mb-0.5">Senam</span>
                                            {p.interventions.senaman ? <Icon name="check" className="w-3.5 h-3.5 text-sky-500" /> : <Icon name="x" className="w-3.5 h-3.5 text-slate-200" />}
                                          </div>
                                          <div className="flex flex-col items-center">
                                            <span className="text-[8px] text-slate-400 font-bold mb-0.5">Minda</span>
                                            {p.interventions.tingkahLaku ? <Icon name="check" className="w-3.5 h-3.5 text-sky-500" /> : <Icon name="x" className="w-3.5 h-3.5 text-slate-200" />}
                                          </div>
                                        </div>
                                      </td>
                                      <td className="py-3 px-3 text-right">
                                        <button onClick={() => setSelectedPatient(p)} className="py-1 px-2.5 bg-white border border-slate-350 text-slate-800 hover:border-sky-500 text-[10px] font-bold font-mono uppercase tracking-wide">
                                          PROFIL
                                        </button>
                                      </td>
                                    </tr>
                                  );
                                })}
                              </tbody>
                            </table>
                          )}
                        </div>
                      </div>
                    </React.Fragment>
                  )}
                </div>
              )}
            </main>
          </div>

          {/* Modal overlay window */}
          {selectedPatient && (
            <div className="fixed inset-0 bg-slate-900/60 z-50 flex items-center justify-center p-4 backdrop-blur-xs" onClick={() => setSelectedPatient(null)}>
              <div className="bg-white rounded-none w-full max-w-xl shadow-xl relative border border-slate-350" onClick={(e) => e.stopPropagation()}>
                <div className="bg-black border-b-4 border-sky-500 p-5 text-white relative">
                  <button onClick={() => setSelectedPatient(null)} className="absolute top-4 right-4 text-white font-bold text-xs p-1 bg-slate-900 border border-slate-800">✕</button>
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-slate-900 border border-slate-800 text-sky-350 font-black text-xl flex items-center justify-center">
                      {selectedPatient.nama.charAt(0)}
                    </div>
                    <div>
                      <span className="text-[9px] font-black uppercase bg-sky-950 text-sky-305 border border-sky-900 px-2 py-0.5">Saringan Berdaftar</span>
                      <h3 className="text-base font-black uppercase text-white mt-1 leading-none font-display">{selectedPatient.nama}</h3>
                      <p className="text-[10px] text-slate-400 font-mono mt-1 font-display tracking-wide uppercase">{selectedPatient.fasiliti}</p>
                    </div>
                  </div>
                </div>

                <div className="p-5 space-y-4 max-h-[70vh] overflow-y-auto">
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-3 border-b border-slate-150 pb-3 font-mono text-slate-700">
                    <div>
                      <span className="text-[9px] text-slate-400 font-bold block uppercase leading-none">NO. KP</span>
                      <strong className="text-xs text-slate-900">{selectedPatient.noId}</strong>
                    </div>
                    <div>
                      <span className="text-[9px] text-slate-400 font-bold block uppercase leading-none">UMUR / JEX</span>
                      <strong className="text-xs text-slate-900 uppercase">{selectedPatient.umur} T / {selectedPatient.jantina}</strong>
                    </div>
                    <div>
                      <span className="text-[9px] text-slate-400 font-bold block uppercase leading-none">BANGSA</span>
                      <strong className="text-xs text-slate-900 uppercase">{selectedPatient.bangsa}</strong>
                    </div>
                    <div>
                      <span className="text-[9px] text-slate-400 font-bold block uppercase leading-none">TELEFON</span>
                      <strong className="text-xs text-slate-900">{selectedPatient.noTelefon}</strong>
                    </div>
                  </div>

                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2 font-display tracking-widest">Ukuran Klinikal (Baseline)</h4>
                    <div className="grid grid-cols-2 gap-2 text-xs">
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[9px] text-slate-400 font-black uppercase tracking-wide">UKURAN BMI</span>
                        <p className="text-lg font-black font-mono text-slate-800 mt-0.5">{selectedPatient.baseline.bmi} KG/m²</p>
                        <p className="text-[9px] text-slate-500 font-extrabold uppercase mt-0.5">{selectedPatient.baseline.bmiKategori}</p>
                        <p className="text-[9px] text-slate-400 mt-1">Berat {selectedPatient.baseline.berat} KG | {selectedPatient.baseline.tinggi} CM</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[9px] text-slate-400 font-black uppercase tracking-wide">TEKANAN DARAH (BP)</span>
                        <p className="text-lg font-black font-mono text-slate-800 mt-0.5">{selectedPatient.baseline.systolic} / {selectedPatient.baseline.diastolic}</p>
                        <p className="text-[9px] text-slate-500 font-semibold mt-0.5">Sistolik/Diastolik (mmHg)</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[9px] text-slate-400 font-black uppercase tracking-wide">UKUR PINGGANG</span>
                        <p className="text-lg font-black font-mono text-slate-800 mt-0.5">{selectedPatient.baseline.waist || 'Tiada Rekod'} CM</p>
                        <p className="text-[9px] text-slate-400 mt-1">Saringan baseline bahagian atas.</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[9px] text-slate-400 font-black uppercase tracking-wide">MENTAL DASS</span>
                        <p className="text-xs font-black text-slate-850 mt-1 truncate">{selectedPatient.baseline.mentalStatus || 'TIADA SARINGAN'}</p>
                        <p className="text-[10px] text-rose-800 font-bold uppercase mt-1 leading-tight">{selectedPatient.baseline.mentalResult || 'Lepas pemeriksaan'}</p>
                      </div>
                    </div>
                  </div>

                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2 font-display tracking-widest">Komorbiditi Sedia Ada</h4>
                    <div className="flex flex-wrap gap-1.5 text-[10px] font-bold uppercase font-mono tracking-tight text-slate-700">
                      <span className={`px-2 py-1 border ${selectedPatient.comorbidities.diabetes ? 'bg-indigo-50 border-indigo-200 text-indigo-850' : 'bg-slate-100 border-slate-150 text-slate-400'}`}>
                        {selectedPatient.comorbidities.diabetes ? '✓' : '✗'} Diabetes (Kencing Manis)
                      </span>
                      <span className={`px-2 py-1 border ${selectedPatient.comorbidities.hipertensi ? 'bg-red-50 border-red-200 text-red-850' : 'bg-slate-100 border-slate-150 text-slate-400'}`}>
                        {selectedPatient.comorbidities.hipertensi ? '✓' : '✗'} Hipertensi (Darah Tinggi)
                      </span>
                      <span className={`px-2 py-1 border ${selectedPatient.comorbidities.dislipidemia ? 'bg-emerald-50 border-emerald-200 text-emerald-850' : 'bg-slate-100 border-slate-150 text-slate-400'}`}>
                        {selectedPatient.comorbidities.dislipidemia ? '✓' : '✗'} Dislipidemia (Kolesterol)
                      </span>
                    </div>
                  </div>

                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2 font-display tracking-widest">Status Penerimaan Intervensi</h4>
                    <div className="space-y-1.5 text-xs">
                      
                      <div className="p-2.5 bg-slate-50 border border-slate-205 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Terapi Diet MNT</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Penyusunan pelan diet makanan KKM</span>
                        </div>
                        {selectedPatient.interventions.mnt ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-50 text-sky-850 border border-sky-200 text-[9px] font-black">LENGKAP</span>
                            {selectedPatient.interventions.mntTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Daftar: {selectedPatient.interventions.mntTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase">TIADA REKOD</span>}
                      </div>

                      <div className="p-2.5 bg-slate-50 border border-slate-205 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Rutin Senaman Fizikal</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Latihan kardiak 150 minit seminggu</span>
                        </div>
                        {selectedPatient.interventions.senaman ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-50 text-sky-850 border border-sky-200 text-[9px] font-black">LENGKAP</span>
                            {selectedPatient.interventions.senamanTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Tarikh: {selectedPatient.interventions.senamanTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase">TIADA REKOD</span>}
                      </div>

                      <div className="p-2.5 bg-slate-50 border border-slate-205 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Terapi Tingkah Laku</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Konseling minda & disiplin kesihatan</span>
                        </div>
                        {selectedPatient.interventions.tingkahLaku ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-50 text-sky-850 border border-sky-200 text-[9px] font-black">LENGKAP</span>
                            {selectedPatient.interventions.tingkahLakuTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Tarikh: {selectedPatient.interventions.tingkahLakuTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase">TIADA REKOD</span>}
                      </div>

                    </div>
                  </div>
                </div>

                <div className="bg-slate-100 p-4 border-t border-slate-200 flex items-center justify-between text-xs text-slate-600 font-mono uppercase font-bold tracking-tight">
                  <span>Tarikh Daftar: {selectedPatient.tarikhDaftar || 'Tiada Rekod'}</span>
                  <span>Akaun: <strong className="text-slate-900">{selectedPatient.statusAkaun}</strong></span>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
