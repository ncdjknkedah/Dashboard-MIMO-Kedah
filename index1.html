<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistem Pemantauan MIMO Kedah</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Google Fonts: Inter & Space Grotesk -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <!-- React & ReactDOM (UMD CDN) -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Babel Standalone compiler (In-browser JSX compilation) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- PapaParse CDN for Google Sheets Dynamic Client parsing -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>

  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    /* Simple geometric scrollbars */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 0px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sky: {
              350: '#7dd3fc',
              450: '#38bdf8',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <div id="root">
    <!-- Loader before Babel compiles -->
    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-slate-700">
      <div class="w-12 h-12 rounded-full border-4 border-slate-100 border-t-sky-500 animate-spin mb-4"></div>
      <p class="font-medium text-slate-900 text-sm">Memuat naik Sistem Pemantauan MIMO...</p>
    </div>
  </div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const CLINIC_SHORTS = {
      "KLINIK KESIHATAN BANDAR ALOR SETAR": "KKBAS",
      "KLINIK KESIHATAN BANDAR SUNGAI PETANI": "KKBSP"
    };

    // Responsive Inline custom SVG Indicators 
    const Icon = ({ name, className = "w-4 h-4" }) => {
      const paths = {
        trending: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2.5" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6" />,
        users: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z" />,
        map: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0zM15 11a3 3 0 11-6 0 3 3 0 016 0z" />,
        refresh: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H18.2" />,
        shield: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z" />,
        search: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />,
        lock: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />,
        info: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />,
        chevronRight: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 5l7 7-7 7" />,
        check: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 13l4 4L19 7" />,
        x: <path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" />
      };
      
      return (
        <svg className={className} fill="none" viewBox="0 0 24 24" stroke="currentColor">
          {paths[name] || null}
        </svg>
      );
    };

    const MimoVectorLogo = () => (
      <div className="flex items-center gap-2 select-none shrink-0">
        <div className="w-11 h-11 bg-white p-0.5 flex items-center justify-center border border-slate-200 rounded-lg shadow-xs">
          <svg viewBox="0 0 200 200" className="w-[40px] h-[40px]" fill="none" xmlns="http://www.w3.org/2000/svg">
            {/* Soft-rounded outer shield / crest in blue */}
            <path d="M25 40C25 40 55 25 100 25C145 25 175 40 175 40C175 40 185 110 160 145C135 180 100 185 100 185C100 185 65 180 40 145C15 110 25 40 25 40Z" fill="#ffffff" stroke="#2d529f" strokeWidth="11" strokeLinejoin="round" />
            
            {/* Light blue orbit loops / ribbons in the background */}
            <path d="M60 85 C52 55, 148 55, 140 85 C132 115, 68 115, 60 85 Z" stroke="#8cb2e6" strokeWidth="7" strokeLinecap="round" opacity="0.65" />
            <path d="M70 100 C70 115, 130 115, 130 100" stroke="#8cb2e6" strokeWidth="4.5" strokeLinecap="round" opacity="0.6" />

            {/* Bright inner blue shield */}
            <path d="M100 55 C120 40, 145 60, 130 100 C118 120, 100 135, 100 135 C100 135, 82 120, 70 100 C55 60, 80 40, 100 55 Z" fill="#2d529f" />

            {/* White Healthcare Cross inside Center */}
            <path d="M91 68 H109 V104 H91 Z" fill="#ffffff" />
            <path d="M82 77 H118 V95 H82 Z" fill="#ffffff" />

            {/* White pulse wave line laid inside the cross */}
            <path d="M75 86 h10 l4 -13 l5 28 l6 -23 l3 8 h15" stroke="#2d529f" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
            <path d="M75 86 h10 l4 -13 l5 28 l6 -23 l3 8 h15" stroke="#ffffff" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{transform: "translateY(0.5px)"}} />

            {/* Polished heavy typography MIMO */}
            <text x="100" y="162" fill="#2d529f" fontSize="24" fontWeight="950" fontFamily="'Space Grotesk', sans-serif" textAnchor="middle" letterSpacing="0.5">MIMO</text>
            
            {/* Subtitle */}
            <text x="100" y="174" fill="#5f7da3" fontSize="5.5" fontWeight="700" fontFamily="sans-serif" textAnchor="middle">MANAGEMENT OF OBESITY</text>
          </svg>
        </div>
      </div>
    );

    // Native custom highly stylized responsive SVG Bar chart
    const ComorbidityBarChart = ({ data }) => {
      const maxVal = 15;
      const chartHeight = 160;
      const groundY = 180;

      return (
        <div className="w-full flex flex-col items-center">
          {/* Detailed Color Legend */}
          <div className="flex flex-wrap justify-center gap-6 mb-4 text-[10px] sm:text-xs font-mono font-bold">
            <div className="flex items-center gap-1.5">
              <span className="w-3.5 h-3.5 bg-blue-500 block border border-blue-600"></span>
              <span className="text-slate-700">Kencing Manis (Diabetes)</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-3.5 h-3.5 bg-red-500 block border border-red-600"></span>
              <span className="text-slate-700">Darah Tinggi (Hipertensi)</span>
            </div>
            <div className="flex items-center gap-1.5">
              <span className="w-3.5 h-3.5 bg-teal-600 block border border-teal-700"></span>
              <span className="text-slate-700">Kolesterol (Dislipidemia)</span>
            </div>
          </div>

          <div className="w-full overflow-x-auto">
            <svg className="w-full h-56 min-w-[320px] max-w-lg mx-auto" viewBox="0 0 460 210" xmlns="http://www.w3.org/2000/svg">
              {/* Grid Lines & Labels */}
              {[0, 0.25, 0.5, 0.75, 1].map((ratio, i) => {
                const y = 20 + ratio * chartHeight;
                const label = Math.round((1 - ratio) * maxVal);
                return (
                  <g key={i}>
                    <line x1="40" y1={y} x2="440" y2={y} stroke="#f1f5f9" strokeWidth="1" />
                    <text x="30" y={y + 4} fill="#94a3b8" fontSize="10" textAnchor="end" className="font-mono">{label}</text>
                  </g>
                );
              })}

              {data.map((item, idx) => {
                const groupX = data.length === 1 ? 160 : (60 + idx * 190);
                const barWidth = 26;
                const gap = 6;

                const dm = item.Diabetes || 0;
                const ht = item.Hipertensi || 0;
                const dl = item.Dislipidemia || 0;

                const dmH = (dm / maxVal) * chartHeight;
                const htH = (ht / maxVal) * chartHeight;
                const dlH = (dl / maxVal) * chartHeight;

                return (
                  <g key={idx}>
                    <text x={groupX + barWidth * 1.5 + gap} y={groundY + 20} fill="#1e293b" fontSize="11" fontWeight="800" textAnchor="middle" className="font-sans font-display">
                      {item.clinic === 'KKBAS' ? 'KK Bandar Alor Setar' : item.clinic === 'KKBSP' ? 'KK Sg. Petani' : item.clinic}
                    </text>
                    
                    {/* Diabetes Bar & Data Label */}
                    <rect x={groupX} y={groundY - dmH} width={barWidth} height={dmH} fill="#3b82f6" rx="1" />
                    <text x={groupX + barWidth/2} y={groundY - dmH - 6} fill="#1e293b" fontSize="10" fontWeight="900" textAnchor="middle" className="font-mono">{dm}</text>

                    {/* Hipertensi Bar & Data Label */}
                    <rect x={groupX + barWidth + gap} y={groundY - htH} width={barWidth} height={htH} fill="#ef4444" rx="1" />
                    <text x={groupX + barWidth + gap + barWidth/2} y={groundY - htH - 6} fill="#1e293b" fontSize="10" fontWeight="900" textAnchor="middle" className="font-mono">{ht}</text>

                    {/* Dislipidemia Bar & Data Label */}
                    <rect x={groupX + 2*barWidth + 2*gap} y={groundY - dlH} width={barWidth} height={dlH} fill="#0d9488" rx="1" />
                    <text x={groupX + 2*barWidth + 2*gap + barWidth/2} y={groundY - dlH - 6} fill="#1e293b" fontSize="10" fontWeight="900" textAnchor="middle" className="font-mono">{dl}</text>
                  </g>
                );
              })}
              <line x1="40" y1={groundY} x2="440" y2={groundY} stroke="#cbd5e1" strokeWidth="1.5" />
            </svg>
          </div>
        </div>
      );
    };

    // Native circular SVG Donut Chart with elegant side legend table & labels
    const BmiDonutChart = ({ data, total }) => {
      let accumulatedPercent = 0;
      const radius = 50;
      const strokeWidth = 14;
      const circumference = 2 * Math.PI * radius;
      
      const colors = ['#0284c7', '#0ea5e9', '#38bdf8', '#0c4a6e', '#64748b'];

      return (
        <div className="w-full flex flex-col md:flex-row items-center justify-center gap-6 p-2">
          {/* Centered Donut */}
          <div className="relative w-44 h-44 shrink-0 select-none">
            <svg className="w-full h-full transform -rotate-90 animate-fade-in" viewBox="0 0 140 140">
              {data.map((item, index) => {
                const val = item.value;
                const percent = val / (total || 1);
                const strokeLength = percent * circumference;
                const strokeOffset = circumference - (accumulatedPercent * circumference);
                accumulatedPercent += percent;

                const color = colors[index % colors.length];

                return (
                  <circle 
                    key={index}
                    cx="70"
                    cy="70"
                    r={radius}
                    fill="transparent"
                    stroke={color}
                    strokeWidth={strokeWidth}
                    strokeDasharray={`${strokeLength} ${circumference}`}
                    strokeDashoffset={strokeOffset}
                    style={{ transformOrigin: '70px 70px' }}
                  />
                );
              })}
            </svg>
            <div className="absolute inset-0 flex flex-col justify-center items-center pointer-events-none">
              <span className="text-[8px] font-black text-slate-400 tracking-widest uppercase">JUMLAH</span>
              <span className="text-xl font-black text-slate-900 tracking-tight font-display">{total}</span>
              <span className="text-[8px] text-slate-500 font-bold uppercase">PESAKIT</span>
            </div>
          </div>

          {/* Interactive Legend with exact data labels */}
          <div className="flex-1 w-full space-y-1.5 text-xs">
            {data.length === 0 ? (
              <p className="text-slate-400 italic text-center text-xs">Tiada data BMI</p>
            ) : (
              data.map((item, idx) => {
                const color = colors[idx % colors.length];
                const percent = total > 0 ? Math.round((item.value / total) * 100) : 0;
                return (
                  <div key={idx} className="flex items-center justify-between border-b border-slate-100 pb-1 text-slate-700">
                    <div className="flex items-center gap-2">
                      <span className="w-3 h-3 block border-none shrink-0" style={{ backgroundColor: color }}></span>
                      <strong className="uppercase tracking-tight text-[11px] text-slate-800">{item.name}</strong>
                    </div>
                    <span className="font-mono font-black text-slate-900 text-[11px]">{item.value} Orang ({percent}%)</span>
                  </div>
                );
              })
            )}
          </div>
        </div>
      );
    };

    function parseFloatSafe(val) {
      if (val === undefined || val === null) return 0;
      const cleaned = String(val).replace(/,/g, '').trim();
      const num = parseFloat(cleaned);
      return isNaN(num) ? 0 : num;
    }

    function App() {
      const [data, setData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [selectedClinic, setSelectedClinic] = useState('all');
      const [selectedBmiClass, setSelectedBmiClass] = useState('all');
      const [selectedGender, setSelectedGender] = useState('all');
      const [selectedIntervention, setSelectedIntervention] = useState('all');
      const [selectedDaerah, setSelectedDaerah] = useState('all');
      
      const [activePage, setActivePage] = useState('page1');
      const [isSidebarOpen, setIsSidebarOpen] = useState(true);
      const [isUnlocked, setIsUnlocked] = useState(false);
      const [passwordInput, setPasswordInput] = useState('');
      const [passwordError, setPasswordError] = useState(null);
      const [selectedPatient, setSelectedPatient] = useState(null);

      useEffect(() => {
        if (activePage !== 'page2') {
          setIsUnlocked(false);
          setPasswordInput('');
          setPasswordError(null);
        }
      }, [activePage]);

      async function fetchClientData() {
        setLoading(true);
        const url = 'https://docs.google.com/spreadsheets/d/1Zn7JHkTrfol2G0Sl4b0oazryk2Syhbp0Xj74HPD1PXU/export?format=csv';
        try {
          const response = await fetch(url);
          if (!response.ok) throw new Error(`Google Sheet fetch error status ${response.status}`);
          const text = await response.text();
          
          Papa.parse(text, {
            header: false,
            complete: (results) => {
              const rows = results.data;
              const patientRows = rows.slice(7).filter(row => row[6] && row[6].trim() !== '');

              const patients = patientRows.map((row) => {
                const mntVal = (row[59] || '').trim().toUpperCase();
                const senamanVal = (row[61] || '').trim().toUpperCase();
                const tingkahlakuVal = (row[63] || '').trim().toUpperCase();
                const farmakologiVal = (row[65] || '').trim().toUpperCase();
                const bariatrikVal = (row[69] || '').trim().toUpperCase();

                const isMNT = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(mntVal);
                const isSenaman = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(senamanVal);
                const isTingkahLaku = ['YA', 'SELESAI', 'DALAM PROSES', 'ADA'].includes(tingkahlakuVal);
                const isFarmakologi = farmakologiVal !== '' && farmakologiVal !== 'TIDAK BERKAITAN' && farmakologiVal !== 'TIDAK';
                const isBariatrik = bariatrikVal !== '' && bariatrikVal !== 'TIDAK BERKAITAN' && bariatrikVal !== 'TIDAK';

                return {
                  negeri: (row[0] || '').trim(),
                  daerah: (row[1] || '').trim(),
                  fasiliti: (row[2] || '').trim(),
                  sumberRujukan: (row[3] || '').trim(),
                  statusRujukan: (row[5] || '').trim(),
                  nama: (row[6] || '').trim(),
                  noId: (row[7] || '').trim(),
                  tarikhLahir: (row[8] || '').trim(),
                  umur: parseFloatSafe(row[9]),
                  bangsa: (row[10] || '').trim(),
                  jantina: (row[11] || '').trim(),
                  noTelefon: (row[12] || '').trim(),

                  comorbidities: {
                    diabetes: (row[13] || '').trim().toUpperCase() === 'YA',
                    hipertensi: (row[14] || '').trim().toUpperCase() === 'YA',
                    dislipidemia: (row[15] || '').trim().toUpperCase() === 'YA',
                    kardiovaskular: (row[16] || '').trim().toUpperCase() === 'YA',
                    lainLain: (row[17] || '').trim() !== '' && (row[17] || '').trim().toUpperCase() !== 'TIDAK'
                  },

                  baseline: {
                    tinggi: parseFloatSafe(row[18]),
                    berat: parseFloatSafe(row[19]),
                    bmi: parseFloatSafe(row[20]),
                    bmiKategori: (row[21] || '').trim(),
                    waist: parseFloatSafe(row[22]),
                    systolic: parseFloatSafe(row[23]),
                    diastolic: parseFloatSafe(row[24]),
                    mentalStatus: (row[52] || '').trim(),
                    mentalResult: (row[53] || '').trim()
                  },

                  interventions: {
                    mnt: isMNT,
                    mntTarikh: (row[60] || '').trim(),
                    senaman: isSenaman,
                    senamanTarikh: (row[62] || '').trim(),
                    tingkahLaku: isTingkahLaku,
                    tingkahLakuTarikh: (row[64] || '').trim(),
                    farmakologi: (row[65] || '').trim(),
                    farmakologiTarikh: (row[66] || '').trim(),
                    bariatrik: isBariatrik,
                    bariatrikTarikh: (row[70] || '').trim(),
                    bariatrikRawatan: (row[69] || '').trim()
                  },
                  tarikhDaftar: (row[197] || '').trim(),
                  statusAkaun: (row[199] || 'AKTIF').trim()
                };
              });

              const clinicsMap = {
                "KLINIK KESIHATAN BANDAR ALOR SETAR": {
                  name: "KK Bandar Alor Setar (KKBAS)",
                  keyName: "KLINIK KESIHATAN BANDAR ALOR SETAR",
                  registeredCount: 0,
                  withInterventionCount: 0,
                  mntCount: 0,
                  senamanCount: 0,
                  tingkahlakuCount: 0,
                  farmakologiCount: 0
                },
                "KLINIK KESIHATAN BANDAR SUNGAI PETANI": {
                  name: "KK Bandar Sungai Petani (KKBSP)",
                  keyName: "KLINIK KESIHATAN BANDAR SUNGAI PETANI",
                  registeredCount: 0,
                  withInterventionCount: 0,
                  mntCount: 0,
                  senamanCount: 0,
                  tingkahlakuCount: 0,
                  farmakologiCount: 0
                }
              };

              patients.forEach(p => {
                let key = p.fasiliti;
                if (!clinicsMap[key]) {
                  if (key.includes('ALOR SETAR')) {
                    key = "KLINIK KESIHATAN BANDAR ALOR SETAR";
                  } else if (key.includes('SUNGAI PETANI')) {
                    key = "KLINIK KESIHATAN BANDAR SUNGAI PETANI";
                  } else {
                    clinicsMap[key] = {
                      name: key,
                      keyName: key,
                      registeredCount: 0,
                      withInterventionCount: 0,
                      mntCount: 0,
                      senamanCount: 0,
                      tingkahlakuCount: 0,
                      farmakologiCount: 0
                    };
                  }
                }

                const clinic = clinicsMap[key];
                clinic.registeredCount++;

                const hasAny = p.interventions.mnt || p.interventions.senaman || p.interventions.tingkahLaku || (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK');
                if (hasAny) clinic.withInterventionCount++;

                if (p.interventions.mnt) clinic.mntCount++;
                if (p.interventions.senaman) clinic.senamanCount++;
                if (p.interventions.tingkahLaku) clinic.tingkahlakuCount++;
                if (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK') clinic.farmakologiCount++;
              });

              const clinicsList = Object.values(clinicsMap).map(c => {
                const pct = c.registeredCount > 0 ? (c.withInterventionCount / c.registeredCount * 100) : 0;
                return {
                  ...c,
                  kpiPercentage: Math.round(pct * 10) / 10,
                  isAchieved: pct >= 80.0
                };
              });

              const totalReg = patients.length;
              const totalInt = patients.filter(p => p.interventions.mnt || p.interventions.senaman || p.interventions.tingkahLaku || (p.interventions.farmakologi && p.interventions.farmakologi !== 'TIDAK BERKAITAN' && p.interventions.farmakologi !== 'TIDAK')).length;
              const overallPct = totalReg > 0 ? (totalInt / totalReg * 100) : 0;

              setData({
                lastUpdated: new Date().toISOString(),
                overall: {
                  registeredCount: totalReg,
                  withInterventionCount: totalInt,
                  kpiPercentage: Math.round(overallPct * 10) / 10,
                  isAchieved: overallPct >= 80.0,
                  targetPercentage: 80.0
                },
                clinics: clinicsList,
                patients
              });
              setError(null);
            },
            error: (err) => {
              setError(err.message || 'Gagal menghurai data CSV.');
            }
          });
        } catch (err) {
          setError(err.message || 'Gagal memuat turun data dari Google Sheets.');
        } finally {
          setLoading(false);
        }
      }

      useEffect(() => {
        fetchClientData();
      }, []);

      if (loading) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-slate-700">
            <div className="w-12 h-12 rounded-full border-4 border-slate-100 border-t-sky-500 animate-spin mb-4"></div>
            <p className="font-semibold text-slate-850 text-sm">Menghubungi Google Sheet...</p>
            <p className="text-slate-400 text-xs mt-1">Sistem Pemantauan MIMO Kedah terbina...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center p-6 text-slate-750">
            <div className="bg-white p-8 rounded-none border border-slate-200 shadow-sm max-w-sm w-full text-center">
              <div className="w-12 h-12 bg-red-50 text-red-500 rounded-none border border-red-200 flex items-center justify-center mx-auto mb-4">
                <Icon name="x" className="w-6 h-6" />
              </div>
              <h3 className="text-sm font-black text-slate-900 uppercase tracking-widest mb-2 font-display">Talian Gagal</h3>
              <p className="text-xs text-slate-500 mb-6">{error}</p>

                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mt-2 text-xs">
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">No. Telefon Bimbit</span>
                        <strong className="text-slate-900 font-mono flex items-center gap-1.5">
                          <span className="inline-block w-1.5 h-1.5 bg-emerald-500 rounded-full"></span>
                          {selectedPatient.noTelefon || 'Tiada Rekod'}
                        </strong>
                      </div>
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">Geografi Rumah</span>
                        <strong className="text-slate-900 uppercase truncate">{selectedPatient.daerah}, KEDAH</strong>
                      </div>
                    </div>
                  </div>

                  {/* 2. Rujukan Pentadbiran */}
                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2.5 font-display tracking-widest">Maklumat Rujukan & Geografi Kontrak</h4>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-3 text-xs">
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">Negeri Sasaran</span>
                        <strong className="text-slate-900 uppercase">{selectedPatient.negeri || 'KEDAH'}</strong>
                      </div>
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">Daerah Klinikal</span>
                        <strong className="text-slate-900 uppercase">{selectedPatient.daerah || 'KOTA SETAR'}</strong>
                      </div>
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">Sumber Rujukan</span>
                        <strong className="text-slate-900 uppercase truncate" title={selectedPatient.sumberRujukan}>{selectedPatient.sumberRujukan || 'Klinik Kesihatan'}</strong>
                      </div>
                      <div className="bg-slate-50 p-2 border border-slate-200">
                        <span className="text-[9px] text-slate-400 font-bold block uppercase leading-tight font-mono">Status Rujukan</span>
                        <strong className="text-slate-900 uppercase truncate" title={selectedPatient.statusRujukan}>{selectedPatient.statusRujukan || 'Selesai Saringan'}</strong>
                      </div>
                    </div>
                  </div>

                  {/* 3. Ukuran Klinikal & Mental */}
                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2.5 font-display tracking-widest">Ukuran Klinikal Baseline & Mental DASS</h4>
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-2.5 text-xs">
                      <div className="bg-slate-900 text-white p-2.5 border border-slate-800">
                        <span className="text-[8px] text-slate-400 font-mono block uppercase">Jisim BMI</span>
                        <p className="text-lg font-black font-mono text-sky-400 mt-1 leading-none">{selectedPatient.baseline.bmi} <span className="text-[9px] font-normal text-slate-300">KG/m²</span></p>
                        <p className="text-[8px] text-slate-300 font-bold uppercase mt-1 truncate">{selectedPatient.baseline.bmiKategori}</p>
                        <p className="text-[8px] text-slate-500 mt-1">H: {selectedPatient.baseline.tinggi}cm | W: {selectedPatient.baseline.berat}kg</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[8px] text-slate-500 font-mono block uppercase">Tekanan Darah (BP)</span>
                        <p className="text-lg font-black font-mono text-slate-800 mt-1 leading-none">{selectedPatient.baseline.systolic}/{selectedPatient.baseline.diastolic} <span className="text-[9px] font-normal text-slate-400">mmHg</span></p>
                        <p className="text-[8px] text-slate-500 mt-1.5 font-medium">Sistolik / Diastolik</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[8px] text-slate-500 font-mono block uppercase">Lilitan Pinggang</span>
                        <p className="text-lg font-black font-mono text-slate-800 mt-1 leading-none">{selectedPatient.baseline.waist || 'N/A'} <span className="text-[9px] font-normal text-slate-400">cm</span></p>
                        <p className="text-[8px] text-slate-400 mt-1.5 leading-tight">Ukur pinggang baseline</p>
                      </div>
                      <div className="bg-slate-550/5 border border-slate-200 p-2.5">
                        <span className="text-[8px] text-slate-500 font-mono block uppercase">Saringan Mental</span>
                        <p className="text-xs font-black text-rose-700 mt-1.5 truncate">{selectedPatient.baseline.mentalStatus || 'TIADA DATA'}</p>
                        <p className="text-[9px] text-slate-500 font-bold uppercase mt-0.5 leading-tight truncate" title={selectedPatient.baseline.mentalResult}>
                          {selectedPatient.baseline.mentalResult || 'Lepas Tapisan'}
                        </p>
                      </div>
                    </div>
                  </div>

                  {/* 4. Komorbiditi Kesihatan */}
                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2.5 font-display tracking-widest">Status Komorbiditi Berdaftar</h4>
                    <div className="grid grid-cols-2 md:grid-cols-3 gap-2 text-[10px] font-bold uppercase font-mono tracking-tight text-slate-700">
                      <span className={`px-2 py-1.5 border flex items-center gap-1.5 ${selectedPatient.comorbidities.diabetes ? 'bg-blue-50 border-blue-200 text-blue-900' : 'bg-slate-50 border-slate-150 text-slate-400'}`}>
                        <span className={`inline-block w-2.5 h-2.5 text-center leading-none ${selectedPatient.comorbidities.diabetes ? 'text-blue-600' : 'text-slate-300'}`}>{selectedPatient.comorbidities.diabetes ? '✓' : '✗'}</span>
                        Diabetes (Kencing Manis)
                      </span>
                      <span className={`px-2 py-1.5 border flex items-center gap-1.5 ${selectedPatient.comorbidities.hipertensi ? 'bg-red-50 border-red-200 text-red-900' : 'bg-slate-50 border-slate-150 text-slate-400'}`}>
                        <span className={`inline-block w-2.5 h-2.5 text-center leading-none ${selectedPatient.comorbidities.hipertensi ? 'text-red-600' : 'text-slate-300'}`}>{selectedPatient.comorbidities.hipertensi ? '✓' : '✗'}</span>
                        Hipertensi (Darah Tinggi)
                      </span>
                      <span className={`px-2 py-1.5 border flex items-center gap-1.5 ${selectedPatient.comorbidities.dislipidemia ? 'bg-teal-50 border-teal-200 text-teal-900' : 'bg-slate-50 border-slate-150 text-slate-400'}`}>
                        <span className={`inline-block w-2.5 h-2.5 text-center leading-none ${selectedPatient.comorbidities.dislipidemia ? 'text-teal-600' : 'text-slate-300'}`}>{selectedPatient.comorbidities.dislipidemia ? '✓' : '✗'}</span>
                        Dislipidemia (Kolesterol)
                      </span>
                      <span className={`px-2 py-1.5 border flex items-center gap-1.5 ${selectedPatient.comorbidities.kardiovaskular ? 'bg-amber-50 border-amber-200 text-amber-900' : 'bg-slate-50 border-slate-150 text-slate-400'}`}>
                        <span className={`inline-block w-2.5 h-2.5 text-center leading-none ${selectedPatient.comorbidities.kardiovaskular ? 'text-amber-600' : 'text-slate-300'}`}>{selectedPatient.comorbidities.kardiovaskular ? '✓' : '✗'}</span>
                        Penyakit Kardiovaskular
                      </span>
                      <span className={`px-2 py-1.5 border flex items-center gap-1.5 md:col-span-2 ${selectedPatient.comorbidities.lainLain ? 'bg-purple-50 border-purple-200 text-purple-900' : 'bg-slate-50 border-slate-150 text-slate-400'}`}>
                        <span className={`inline-block w-2.5 h-2.5 text-center leading-none ${selectedPatient.comorbidities.lainLain ? 'text-purple-600' : 'text-slate-300'}`}>{selectedPatient.comorbidities.lainLain ? '✓' : '✗'}</span>
                        Lain-Lain Komorbiditi
                      </span>
                    </div>
                  </div>

                  {/* 5. Pelan Intervensi Bertempoh (MNT, Senaman, Minda, Farmakologi, Bariatrik) */}
                  <div>
                    <h4 className="text-[10px] pb-1 border-b border-sky-450 font-black uppercase text-slate-500 mb-2.5 font-display tracking-widest">Pelan Tindakan Intervensi Klinikal</h4>
                    <div className="space-y-2 text-xs">
                      
                      {/* Diet MNT */}
                      <div className="p-2.5 bg-slate-50 border border-slate-200 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Terapi Pemakanan Diet MNT</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Penyusunan pelan diet makanan seimbang</span>
                        </div>
                        {selectedPatient.interventions.mnt ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-100 text-sky-850 border border-sky-200 text-[9px] font-black uppercase rounded-xs">BERJAYA AKTIF</span>
                            {selectedPatient.interventions.mntTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Pendaftaran: {selectedPatient.interventions.mntTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase border border-slate-200">TIADA REKOD</span>}
                      </div>

                      {/* Senaman */}
                      <div className="p-2.5 bg-slate-50 border border-slate-200 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Latihan Senaman Fizikal</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Preskripsi latihan kardiak & rintangan</span>
                        </div>
                        {selectedPatient.interventions.senaman ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-100 text-sky-850 border border-sky-200 text-[9px] font-black uppercase rounded-xs">BERJAYA AKTIF</span>
                            {selectedPatient.interventions.senamanTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Tarikh Sesi: {selectedPatient.interventions.senamanTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase border border-slate-200">TIADA REKOD</span>}
                      </div>

                      {/* Tingkah Laku */}
                      <div className="p-2.5 bg-slate-50 border border-slate-200 flex items-center justify-between">
                        <div>
                          <strong className="text-slate-850 block uppercase text-[10px]">Terapi Tingkah Laku & Disiplin Minda</strong>
                          <span className="text-[9px] text-slate-400 font-mono mt-0.5">Bimbingan psikologi & sokongan keluarga</span>
                        </div>
                        {selectedPatient.interventions.tingkahLaku ? (
                          <div className="text-right">
                            <span className="px-2 py-0.5 bg-sky-100 text-sky-850 border border-sky-200 text-[9px] font-black uppercase rounded-xs">BERJAYA AKTIF</span>
                            {selectedPatient.interventions.tingkahLakuTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Tarikh Sesi: {selectedPatient.interventions.tingkahLakuTarikh}</p>}
                          </div>
                        ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase border border-slate-200">TIADA REKOD</span>}
                      </div>

                      {/* Farmakologi (Preskripsi Ubat Obesiti) */}
                      <div className="p-2.5 bg-slate-50 border border-slate-200">
                        <div className="flex items-center justify-between">
                          <div>
                            <strong className="text-slate-850 block uppercase text-[10px]">Rawatan Ubat Farmakologi Obesiti</strong>
                            <span className="text-[9px] text-slate-400 font-mono mt-0.5">Preskripsi ubat berpaten diiktiraf Kementerian Kesihatan</span>
                          </div>
                          {selectedPatient.interventions.farmakologi && selectedPatient.interventions.farmakologi !== 'TIDAK' && selectedPatient.interventions.farmakologi !== 'TIDAK BERKAITAN' ? (
                            <div className="text-right">
                              <span className="px-2 py-0.5 bg-purple-100 text-purple-855 border border-purple-200 text-[9px] font-black uppercase rounded-xs">ADA RAWATAN</span>
                              {selectedPatient.interventions.farmakologiTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Resipi: {selectedPatient.interventions.farmakologiTarikh}</p>}
                            </div>
                          ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase border border-slate-200">TIADA UBAT</span>}
                        </div>
                        {selectedPatient.interventions.farmakologi && selectedPatient.interventions.farmakologi !== 'TIDAK' && selectedPatient.interventions.farmakologi !== 'TIDAK BERKAITAN' && (
                          <div className="mt-2 p-2 bg-purple-50/50 border border-purple-150 text-[10px] text-purple-900 font-mono">
                            <span className="font-bold uppercase tracking-wider block text-[8px] text-purple-600">Preskripsi Klinikal:</span>
                            {selectedPatient.interventions.farmakologi}
                          </div>
                        )}
                      </div>

                      {/* Pembedahan Bariatrik / Metabolik */}
                      <div className="p-2.5 bg-slate-50 border border-slate-200">
                        <div className="flex items-center justify-between">
                          <div>
                            <strong className="text-slate-850 block uppercase text-[10px]">Pembedahan Bariatrik / Metabolik</strong>
                            <span className="text-[9px] text-slate-400 font-mono mt-0.5">Sleeve gastrectomy / gastric bypass bagi kes ekstrim</span>
                          </div>
                          {selectedPatient.interventions.bariatrik ? (
                            <div className="text-right">
                              <span className="px-2 py-0.5 bg-emerald-100 text-emerald-850 border border-emerald-200 text-[9px] font-black uppercase rounded-xs">AKTIF RUJUKAN</span>
                              {selectedPatient.interventions.bariatrikTarikh && <p className="text-[9px] text-slate-400 mt-0.5 font-mono">Selesai: {selectedPatient.interventions.bariatrikTarikh}</p>}
                            </div>
                          ) : <span className="px-2 py-0.5 bg-slate-100 text-slate-400 text-[9px] font-black uppercase border border-slate-200">TIADA RUJUKAN</span>}
                        </div>
                        {selectedPatient.interventions.bariatrik && (
                          <div className="mt-2 p-2 bg-emerald-50/50 border border-emerald-150 text-[10px] text-emerald-905 font-mono">
                            <span className="font-bold uppercase tracking-wider block text-[8px] text-emerald-600">Status Pembedahan / Rawatan:</span>
                            {selectedPatient.interventions.bariatrikRawatan || 'Dalam Proses Saringan / Selesai'}
                          </div>
                        )}
                      </div>

                    </div>
                  </div>

                </div>

                <div className="bg-slate-100 p-4 border-t border-slate-200 flex items-center justify-between text-[11px] text-slate-600 font-mono uppercase font-bold tracking-tight">
                  <span>Tarikh Pendaftaran MIMO: {selectedPatient.tarikhDaftar || 'Tiada Rekod'}</span>
                  <span>Akaun: <span className="text-emerald-500 font-black">{selectedPatient.statusAkaun || 'AKTIF'}</span></span>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
